<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Convertly logo</title>
  <desc id="logoDesc">A layered document mark with a directional conversion arrow.</desc>
  <defs>
    <linearGradient id="convertlyBg" x1="20" y1="18" x2="140" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4ec"/>
      <stop offset="1" stop-color="#e7fbf7"/>
    </linearGradient>
    <linearGradient id="convertlyAccent" x1="44" y1="36" x2="120" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9b61"/>
      <stop offset="1" stop-color="#27bea8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#2d5277" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="120" height="120" rx="32" fill="url(#convertlyBg)"/>
  <g filter="url(#softShadow)">
    <rect x="42" y="34" width="48" height="66" rx="12" fill="#ffffff" stroke="#d7e7f5" stroke-width="2"/>
    <path d="M54 52H78" stroke="#9fb8d2" stroke-width="4" stroke-linecap="round"/>
    <path d="M54 64H72" stroke="#bfd0e0" stroke-width="4" stroke-linecap="round"/>
    <path d="M54 76H78" stroke="#bfd0e0" stroke-width="4" stroke-linecap="round"/>
    <rect x="70" y="58" width="48" height="66" rx="12" fill="#ffffff" stroke="#d7e7f5" stroke-width="2"/>
    <path d="M82 76H106" stroke="#9fb8d2" stroke-width="4" stroke-linecap="round"/>
    <path d="M82 88H100" stroke="#bfd0e0" stroke-width="4" stroke-linecap="round"/>
    <path d="M82 100H106" stroke="#bfd0e0" stroke-width="4" stroke-linecap="round"/>
    <path d="M69 86C73 74 85 67 98 67C104 67 110 68 115 71" fill="none" stroke="url(#convertlyAccent)" stroke-width="9" stroke-linecap="round"/>
    <path d="M111 57L125 73L103 77" fill="none" stroke="url(#convertlyAccent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
